body:
  text: 方是閒居士小藁别集類三宋提要臣等謹案方是閒居士小藁二卷宋劉學箕撰學箕字習之崇安人劉韐之曽孫劉子翬之孫劉㻫之子也隱居不仕自號種春子家饒池館有堂曰方是閒故又號方是閒居士是編上卷古今體詩一百七十一首下卷賦及雜文二十七首長短調三十八首前有嘉定間建陽劉淮東里趙蕃開封趙必願三序末有學箕自記及其門人遊郴等跋初所鋟板因兵亂散失元至正辛丑其裔孫名張者復重刻之此編蓋從刻本影抄者也劉淮序稱其筆力豪放詩摩香山之壘詞拍稼軒之肩今觀集中諸詞魄力雖少遜辛棄疾然如其和棄疾金縷詞韻述懷一首悲壯激烈忠孝之氣奕奕紙上不愧為韐之子孫雖置之稼軒集中殆不能辨淮所論者不誣至其詩雖大體出白居易而氣味頗薄歌行則往往放筆縱橫時露竒崛或傷于稍快稍粗與白居易又别一格淮以為抗衡居易則似尚未能矣乾隆四十四年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀方是閒居士小稿序有隱君子劉習之屏山先生的孫七者翁之暮子也飲酒賦詩自其家風年未五十忽移家築室於南山之下疏林剔藪引泉植竹蒔魚種秫造亭立館其最宏敞者乃方是閒堂也堂據池上芙蕖碧水桃霞梅雪具勝四時若壺天然日與佳客飲飲醉吟詩詩成更酌或至逹旦明日復然若竹林避世者今十年矣遊季仙近得其新舊稿一編歸以相示豫歎其筆力豪放詩摩香山之壘詞拍稼軒之肩至若松江哨遍直欲與蘇仙爭衡真竒作也使屏山先生七者翁二君子不沒見其若子若孫如此豈不欣愜不惟季仙溟涬弟之雖老漢亦須放之出一頭地但近世詩人零落殆盡無可考訂前輩唯一章泉老人近在玉山豫欲為之拈出以求印證季仙學詩於習之者當毋吝一往嘉定十年立冬日溪翁劉淮叙自溪翁還閩游季仙足跡不復到吾廬今日忽犯寒來問其來之故則袖有所銜出之乃吾契家劉習之詩與書也發緘觀之令人應接不暇自卯至申大略已盡大抵古今詩文一事耳若次而言之則所取或多極而言則然者蓋寡習之詩佳處固多矣如與二猶子送生荔枝詩驪山往事不古監艮嶽馴致烽烟狂如夏雨嘆舊㑹既收新㑹降至遂令百姓愈惶惑之類殊有風人之體如追和林子仁絶句不類和者如武夷山長句欲刪十年不到武夷山幾與神仙絶往還我見溪山渾似舊溪山見我鬢毛斑自是一好絶句昌蒲記不惟贊詩俱佳而記二十四盆斛亦有筆力所寄兩集既經平子矣而習之因溪翁之言必欲使季仙問我我見如此季仙口雖諾矣未知其心以為如何又未知習之以為如何又未知溪翁以為如何溪翁劉氏字叔通習之名學箕季仙名郴嘉定丁丑十月二十九日東里趙蕃昌父書喬木故家何地不有聲名解愈久彌著以文獻未墜也維忠顯劉公節義凜然少傅甬山先生大勳粹學前後照映我外祖忠肅公又為近世名樞輔諸舅角立頡頑縉紳之林可謂盛矣方是閒居士乃獨隱約逰戲翰墨間所以振起芳烈者蓋在此而不在彼必願試邑道德之鄉負念一掃居士之門忽不鄙賜書且教以小稿兩集夙啓展玩洞心駭目左酬右接竟日不暇讀羊生荔枝詩云書生不負醫國手賦成何日奏明光和辛稼軒金縷詞云國恥家讎何年報中夜聞雞狂起舞固知居士之立志即忠顯少傅忠肅之志而養浩堂分題則深悟乎持養志氣之不蚤又知居士之講學即屏山先生之學也劉氏文獻其真不墜矣居士負挾所長施用未究是豈終隱約者耶必願嘆嘉不足期望實勤若夫律語之工詞藻之富見於林止之勝賞寓於湖海之高興則有東里溪翁二雋老品題可以證信非必願晚陋所敢贅贊也嘉定戊寅上元日甥開封趙必願再拜敬書
