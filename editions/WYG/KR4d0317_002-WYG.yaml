body:
  text: 方是閒居士小稿巻下宋劉學箕撰木犀賦并序避世之士遯其光而弗耀巻其道而弗售雖不知於人弗遇於世澹泊沖和怡樂四時初何蘄於人之知世之遇哉然一經品題足以遺芳後代是山林巗谷所不能終汨没其身而無所表暴於世也草木之生也亦然葢所謂知於人遇於世者亦有幸不幸時不時之嘆木犀為花高雅出類馨發而不淫清揚而不媚有隠君子之德嫓之籬菊江梅雖不同調而同其情其五桞孤山之朋儕乎然見於楚詞之後世或未賦之至如牡丹桃花橘柚槐桞抑何所長而皆著之賦頌獨於此花絶未有發幽光而出潛徳者豈闕典歟為作數語以廣之其詞曰對西風之摇落惨灝氣於素商憫百草之殄瘁驚木犀之吐香緑葉扶疎髙枝蟠虬潤沐乎暁烟夕露清颺乎皓月明秋崇岡之崕小山之幽黄英燦然宛其靚修可援可攀可處可逰儼商山之隠士邈未可以晤語左揖手兮素娥右拍肩兮青女青女兮拭妝素娥兮照袂散十里之清芬揚郁烈而不媚茲葢與菊英兮齊驅並梅花於伯季者也彼春風穠華非不緐嘉爛然紅紫燦若朝霞嗟美麗之過眼等委氣於泥沙惟此叢生雅有深致獨抱明哲逺屏聲利託根雲林絶跡朝市飽三秋之風霜復優㳺以卒嵗韜葉底之輕明類有徳者之避世迨夫冰雪沍寒晚節彌厲雖零落於山樊之間蒼苔之上有騷人雅士申之以無斁之歌亦既見止不忍遐棄收其朽腊暇日而爇之明忩浄几猶足返其魂而續其遺味也耶畫壁賦方士李畫松竹梅蘭山石於南堂之照壁方是閒主人見而賦之其詞曰彼方外之士兮能卓犖而不羣登吾南堂兮運乎中書之君心役手兮倐然前陳枝與條兮生意若神染墨寫真兮豪釐莫差其形松老而夀兮歴世故之舊兮竹清而瘦兮中立而不疚兮梅偃蹇而横枝兮吐歲寒之芳姿蘭滋芳於水涯兮美不蘄人之知介於石兮黝而醜兮合四花兮成五爻兮客至顧瞻心齎咨兮忽清風之來兮儼芳馨之紛披過日華之西兮亂雲影之参差聊延佇以終晷兮撚髯鬚而吟思方其火雲張去聲空袢暑金液散髪舒嘯氣息吁吸面之以揚清泠挹之而傲泉石及其遐想𤣥陸霰雪交集北風呼號萬木凍立吾不知松竹梅蘭之為畫耶意其真是而相錯乎山之隙也余曰噫嘻世固有之萬物變幻子奚不思彼林林縂縂之衆兮與之形質而不卑小大之齊人不可得而推之兮又烏能妙結而全窺惟天地造物之巧兮有非人力之所能為今摹狀而傳真兮乃工於畫筆之所移是人力足以奪造化之權而造物者果不勝人力之巧思者耶且夫瀛洲之僊兮名昭於前兮千古不泯兮託筆墨以傳兮凌烟之像兮勲業相望兮顔範具瞻兮炳丹青以狀兮此其是耶色非丹雘抑猶非耶宛其林壑理固𢎞深言求博約客惟唯唯俯不見答畵耶真耶一笑而作昔蔡公孚有偃松賦王公曽有矮松賦學箕得老松狀如倚葢因作倚松賦嘉定紀年丁丑維嵗就盈日月壬子之未仡然三夫呀吸來詣戴負古松結蒼疊翠囘翔婉娩跛倚靚毅寘彼庭隅屏植清閟廼相與莞爾一笑歛襟揚袂而言曰此木衍迤非杉非檜涉歴春秋疇話代世生於括蒼之深山老於人跡所不到之地斷崕巉巉矗壁厲厲猿猱愁其嶮􅇖鼪狖畏其銛鋭跂而望之心乎愛矣廼因採藥謀發雅計於是壑萬丈以闖頫綆千㝷之縋繫志惕神驚汗流浹背是斸是鋤於寶於衞亦既得之忘餐失寐不逺乎千里之程貿然而來來葢將以遺夫人之好事也方是閒主人喜而受之與之金而食乎稲飲乎酒而肉以彘分命長鬚易莒以斛沐以靈泉植以壤沃遷卑堂所娛翫不足循除而睨之盤旋以撫之又賦之於辭曰夫何挺特之操兮託根崕㟴雲深路奥兮晦迹韞匱隠淪之抱道兮潛伏彌竒羞側足以躅􅙚􅚤兮寒往暑來幾何年兮時移事易幾推遷兮期守故節久彌堅兮癯橋山澤泯無傳兮吁嗟若人貪婪之深兮移根紅塵不保其清兮命之不偶籍之萌為利之心兮吾將陳之不能究其情之所由以闕也且夫孤髙之姿挺特之質騐之於今考之在昔大夫之封處士之節嵗寒不凋霜沍逾潔直聳雲烟浄延風月或擬之森森或對之烈烈或取樂一丘或邀榮雙闕或然以讀書或掉以陳説茲殆以人而見諸又烏識堅剛之竒絶者哉其有美之為讃詠之於辭著之成賦取之於詩影搖千尺青貫四時既食其實又啖其脂且愛其聲復憐其姿亦騷人雅士之有感寓之意而不能忘其私也嗚呼地産珍材天毓粹媺髙不數尺大僅盈軌翩翩帷葢之傾卓卓車輪之倚亭亭巗谷之秀楚楚山林之偉乃今磐互夫軒楹超越乎煙水一根立兮雙幹輪囷百修蕃兮萬枝紛委皮鱗鱗兮幡蒼虬鬛針針兮團刺蝟飛鳯兮來儀囘鸞兮翔跱風吟兮春濤鳴空日射兮雲影覆地連蜷兮森瑶瑛婆娑兮擁幢旞此實目之所未覩亦人之競託以為異也嗟夫名稱百木之長用為一世之竒烟阬陂陁雲嶺委蛇合抱昻空何地無之旦旦而伐力不知疲舟車所求棟梁是資此葢以其材而適於用知於人而遇於時今汝以跼蹐傴僂蚴虬離披世不汝醜反頌汝竒似子不才山樊水湄終焉允臧謙以自卑永畀天年相與逰嬉斧斤何戕塵鞅何縻廼其幸歟抑又何悲中秋翫月記中秋翫月古今所同者也雖古今所同然故實所始騷人雅士不多見於載籍後世未嘗無遺恨焉惟唐四門助教歐陽公貞元十二年與邰楚長林藴陳詡客長安邸中修厥翫事賦詩叙景曲盡其妙且謂月之為翫冬則繁霜太寒夏則蒸雲蔽月雲蔽月霜侵人蔽與侵俱害乎翫秋之於時後夏先冬八月之於秋季始孟終十五於夜又月之中稽於天道則寒暑均取於月數則蟾兎圓况埃􅅽不流太空悠悠芳菲裵徊桂華上浮升東林入西樓肌骨與之疏涼神魂與之清泠斯古人所以為翫也每一讀之未嘗不捲巻三復其説古今同翫是月獨歐陽公情思宛曲形容詳盡不出此數十語是古今翫者幾何人而播傳於後者止見於是序何翫之多多而筆之鮮鮮也辛未月夕予與猶子康廟庾庲席飲於屏山故廬之北溪集賔友劉中友直孫溶柯君衡江漢吳澤浩歌持白盡宵而罷夜漏既深溪光摇蕩表裏澄澈仰視霄漢無纎雲之留俯顔清影若明鑑之燭雖平生夢寐蓬萊廣寒之逰疑不是若也况復露氣清潤巗桂馥郁穠浸肌骨幽情無奈其翫雖與昔人是同而清香溢琖􅕌霑襟䄂不知長安之翫有是乎方其長安之翫有瑣瑣之悲故鄉之念尊酒千里恨不同風今諸公與予無在客之憂懐土之痛唱而和勸而酬優㳺夷愉樂縱其極吾又料昔人之翫必無是也已而復自念言人生悲樂之不常天宇陰晴之靡定後之中秋如吾之十二人者果能無悲歡聚散以復集於此乎藉曰同之天宇高髙果能無陰晴之變乎蟾兎光滿果能常皎皎如斯夕乎天時人事是未可期也臨文嗟悼政古人所以常興感愴之歎吾曹其獨能恝然於懐而無所繫於心哉既而尊傾月落坐客霑醉友直請余記其事余揖客以歸命章子執燭援筆書其顛末為來嵗故事是不可不記一枝堂壁記劉氏一枝堂太子太保公元豐三年所營也建炎初燬於兵火淳熈二年伯父忠肅公嗣建於潭溪祖居規模甫就弗克興創而薨我先君七者翁不忘先志九年乃重建於翠壁之下翁殁諸兄逰宦四方復頺廢於十六年廢後又二十八年元孫學箕再建於南山溪上一枝葢取荘周鷦鷯深林之義事具先君記文中嗚呼惟我髙祖及我先人作述之意有不可揜者在昔我祖以文章器業聞於四方以經術為先師學者至數百千人傳道解惑凡五上春官不合而歸築室屏居養親適懐示無當世榮望意不枉其進而恬其退髙風凜然猶可想見我先人承累世焜燿之澤傳德行道藝之懿登進仕路致君澤民何往不濟廼甘退處奉祠於家抱道以致嗚呼是固有過人者矣且天下之所慕者富貴耳天下之所不屑為者隠約耳今也捨人之所慕而從人之所不屑為是不有大過人者其孰能與於此哉古者固有遜千乘之國辭卿相之位而不為髙耕寛閒之野釣寂寞之濵而不為怨二者榮悴雖不同其為憂樂亦有異使遂樂富貴而悲貧賤希勢利而忘隠淪其立志也為矯其潛處也為偽進退出處兩非其道吾知其必不然也不然則豈不謂之遭有時逹有命歟雖然命固懸乎天身固遭乎時大丈夫不識保身亷遜之明哲髙偉洞澈之機鑒安命俟時以樂其心將使後世疑其得一而失一也惟知命者不然世之言曰根大者枝必茂膏沃者明必熾遺於彼而得於此嗇於身而昌於後不在其身必在其子孫此又理之顯然者天地昭著福善禍淫若數計符合若燭照龜卜無少差舛吾家自五季末來居此鄉逮今十二世矣田園粗供伏臘二百餘年祖孫相承不替其業詩書足以傳家父詔兄命守而無違圭組軒裳接聨於世一枝之安抑可謂得其所安矣且此堂之建由我宫保公而下太師忠顯公興焉秉節不屈光照千古少傅秘閣屏山先生三公繼焉勲業道德載在方册忠肅公又繼焉立朝行已為時名臣所謂根之茂者其實遂膏之沃者其光􅈌豈虛語哉我先人經之營之歴年滋淺故未有發潛德而繼前躅者予小子不敏何足以當之惟不敢遺先美不敢墜厥緒茲營南山新居復建此堂且祠我宫保公及我先人於其中庸見命堂之意以致其景仰之思抑所謂不在其身而在其子孫者當勉之諸子不肖亦不敢不自勉飭祠成因志於壁以告我後人嘉定八年臘月十有八日元孫學箕記寓室記始予讀莊周禦冦書謂人有生直一世之寓耳故其以存為附贅懸疣以死為潰癰决疣忘肝膽遺耳目視世之富貴利逹流行坎止而逰乎天地之一氣聴其自逝信其所止曷嘗繫憂愉於心哉嘗反復其説固知大塊載之以形勞之以生佚之以老息之以死是為一世之寓而不知其所以真寓者何如也比壯東西南北區區而之秦僕僕而適楚乃稍曉解其理逮夫更歴滋多事情益熟然後真識寓之所以為寓也故嘗為之説曰使人心安於所寓縱流離困苦視世之變遷若不釋然者凡志慮所接皆為勝境矣使人心不能安汝所止雖日享髙堂邃館以華其居媌娥鍾鼎以悦其意吾知其弗以為樂而祗益動安土重遷之歎爾予以嘉定癸酉中秋抵安康館於漢東書院屋宇靚深梅竹茂宻前通州治之東㕔接以過廊後有堂甚閎壯榜以平心左史劉公某所書也堂側即書院所環列明窻爽潔特甚後架廊以接厨廥前創亭以趨東㕔後廡周囘繚曲不類官廨若東西王侯第宅而又不與有治相混雜葢舊史君家侯某所營也凡予㳺息日徜徉其間明年秋九月始劈竹為疎櫺就障後廡為小室方圓不過㝷丈琴書堆案畫圖張壁若坐廣厦若居髙明以之室處以之御冬葢深知為寓之樂矣因自念言萬物賦形宇宙間小大飛走蠢然何知有知且靈者惟人爾夫以蠢類無知之物若蜂之牖於房螘之國於垤蛛之都於簷螟蛉之室於壁一不完其居適其性知整葺焉孰謂靈者反不若蠢者之有能乎哉故予感其事述寓言因榜曰寓室一日客至坐甫定莞爾而笑曰子形甚偉子志甚大巻其才而弗施抱其道而弗售今廼跼蹐於斗大之地以傲睨一世自謂得於所寓吾見其隘爾未見其大也予曰是固然矣抑不知子之所謂大而寓者將以鴻荒太極為寓耶以汗漫六合為寓耶以丈夫四方之志而安事一室耶抑亦為人生去來之無常而不必以泥其跡也且予來為寓公安此寓室可謂幸㑹况家山在念歸興浩蕩一日揚舲東下此室存之與否所不能知而予偉形大志固自若也子何哂焉使後之同志者見葺而新之必曰斯人也處小而志不卑存大而用不迂其安於義命者矣安於福分者矣茍或撤而去之滅蹤削跡又豈其數也歟豈其寓也歟子為我言之客不能對既出追其語以記之子月十有八日寓室主人記菖蒲記蒲為品不一生谿磵者謂之蓀植池沼者謂之蒲皆麤壯豐碩恐韓子所謂昌陽者是也惟煙崕雲谷間自有一種葉森而細瘠而堅脊若劒狀若髪丰茸蓬鬱根脉盤錯一寸十餘節本草謂久服輕身延年益心智可入藥者疑此也余前年經廬阜過洞口見居人貨山石竒甚意可種此以助小軒幽雅至南康適遇賣者提携傍余舟扶疎緑浄可愛可翫以金易二十斛以歸然尚恨蒲肥不與石稱雖不若蓀之偉亦未至髪之細今夏物色數本修矗若緑絲森峭若霜劒真竒秀也未幾僧志瑛又將其禪房所養者為寄清波漪漪白石齒齒瑛於石之前後植為首尾蹲伏偃踞宛類卧猊余寘之衆斛之中以冠其首其餘髙下有次環列坐隅乃易其斛而記之河北青瓷盆者一福唐夀山石為斛者二劍津玳瑁石為盆者三番陽白瓷方斛者四龍泉碧青盆者一崇安紺色花鼓者十有六南康舊烏瓦缶者八合計二十四盆斛嗚呼亦可以為富矣余嘗為作讃賦詩云茸其髪劍其脊露葉凝泉雲根絡石英英塵俗之表濯濯丰神之特稜稜林壑之秀戢戢澗溪之質茲葢飽九秋之烟霏擅千巗之叢碧者也詩云沙石一杯水憐渠長養勤几間生谷岫座上得烟雲九節蒼龍瘠千莖緑髪紛山房􅙘牖浄閒澹我同君又云掬水仍盛露晨忩日日看為渠黄葉剪如我白鬚刪龍蟄盤根古蠶冰痩節寒杜門無俗客幽事政相闗然余疇昔無所嗜好少日有書畫之癖中年酷愛書籍邇日乃玩意於菖蒲此皆幽人逸士之常態較之留意他物豈不萬萬相遼逺哉昔人之有愛石者愛琴者愛山水者愛菊愛蓮者愛竹愛梅者其標致品格如何則余之愛書畫愛典籍愛菖蒲亦猶是耳是未可以為冗長􅅓今竹􅙘松几朝吟暮坐列數百軸畫對數千巻書羅數十斛菖蒲時開一軸時讀一巻意倦則徙倚伸欠於菖蒲之間亦足以樂此生矣朋舊過臨能同此樂則清心宴坐坐至於忘言可也不能呼樵青煮茶茶罷揖之使去云嘉定十年五月十有六日種春子劉學箕記紫芝頌并序辛未嵗七月某日予於故廬之前見有執紫芝而過者就觀焉繼求其餘焉人曰此公祖塋之所産者盡以授予予得之喜甚即往省諸墳塋山之上下皆芝也一莖一葉者有之一莖九葉十葉而成房者有之其莖若漆之瑩其葉則紫而浄槁而不枯榮而不華扣之而有聲携之而歸人之疑信者相半予之自信則不疑也然芝也不種於人不恒有於世人雖遇之孰知其為芝乎林者吾知其為木葉者吾知其為竹松栢蓬蒿蕭艾吾知其為松栢蓬蒿蕭艾惟芝也不可知不可知則其謂之非芝也亦可矣雖然芝之生必有禎祥昌其後芝為端世物也芝之果不為禎祥也夫世之疑者不足恠也恠其弗識也識則無所疑矣余感其事故為之頌維芝雋潔兮非眷之力兮毓無種裔兮是為芝之德兮維芝敷生兮非人之耘兮特見挺出兮是為芝之神兮惟芝緐茂兮靡候耕耨兮抽蔚擢秀兮是為芝之夀兮維芝突萌兮固守其貞兮槁而實腴兮是為芝之靈兮適山而採之雲根連野兮㧞不滯茹兮伊人之取捨兮採之盈篚兮人莫知已兮吾其與爾兮自信而不恥兮長生頌夀吳太尉猗歟吳侯肅振貔貅克壯其猷丹桂黄華壁月綺霞秋今益佳初度剛辰維嶽降神生甫及申英烈磅渹氣節鏗鈜文武並更剪除姦兇紹復疆封績用彌隆帝悉忠勤委寄専城民事詳明頌聲洋洋課最孔彰燕寢凝香外間持權倚重三邉號令整嚴烽燧宵沉鼓鉦晝清元戎治成凡厥所難弊流多端革不憚煩是創是懲既安且寧綱維舉行勲在王廷澤在生民天上麒麟麻宣制除詔驛在塗齋壇紫樞鳴鼉奏璈胙土分茅夀極崧髙福昌子孫鼎彛石存功崇位尊山巍川流八千春秋與國同休止酒頌并序嘉定三年余寓止南徐與三山陳惟定逰每邂逅次上而江山寺觀下而市樓客邸必相與論詩論詩未嘗不醉嵗暮余將歸閩惟定連夕過余徘徊凄惻不忍遽别一日惟定容色惨戚若有不自釋然者口若有説而未宣闕語而復囁嚅覺其意切而情甚專也予感其心請其言惟定乃舉首揚眉揎腕掀髯旁引曲喻舉後證前葢謂予之多飲勉予節止之是先繼念予獨力以當世事復相憫終鮮之無兼予深感夫意之蹇諤荷其眷之勤拳念别去之經嵗徒負負以未悛豈無他人情吐肺肝酒食徴逐孰能告焉念益友之警誨誠藥石之鍼砭今而後兮愓厲敬佩服以勉旃厥初生民求全真淳麯米囘春緩酌輕歌衰顔紅酡毓養天和後世肆忽爛腸腐脇縱情敗德溢以池渑相以肉林忘國殞身彼髠自累一石致醉徒多為貴逮夫劉伶五㪷解酲曷若獨醒竹林謂賢羣飲謂僊淪胥忘年白也興發醉狂莫遏采石捉月皇天無親禍福在人沉湎是懲靖節逹理日泰厥㫖斷以真止予何人斯倒壺闕平聲巵不覺其迷銘紳書盤持戒静專期無負朋友之言節酒銘并序方是閒居士心固好客以多飲廢事而又獨力既為頌以止之朋舊之來訪者不能飲茶即退必為開樽每執琖客獨飲居士以立戒辭客意甚不樂飲雖醉情頗不􅨹音含往往不察居士心遂以為孤介傲物然居士之赴親舊之招者亦復以止為請坐是取詞速譴不獲已間去聲或破戒纍纍杯勺不知一杯復一杯也且惡居士之執徳不囘反極其飲顛頓過量有甚於未戒之初徒視所頌為虛文而不能必其止也因自念言與其沉湎以敗德喪生不若真止之為愈與其獲誚於交友朋舊孰若絶交之是闕又自為之説曰止酒既獲罪於人絶交尤獲罪於人止酒且不可况於絶交乎止與絶二者誠介傲事世所不可行者孰謂居士之倜儻而可行乎哉今酌以中道取斷於心每遇把杯不得踰三爵庶幾釋交逰之議而有以全居士之生其或不亮而終困之是又不近人之情也其可乎節酒之銘於是乎作嗚呼噫􅐵狂藥之害生兮彼儀狄之不仁兮戕天下後世之人兮嗚呼噫􅐵世競飲之莫知其非子不爾思將殘其體肢頌焉止之曷不守之流連沉迷覆蹈前輗崇飲貪杯謂畏親友之譏君子愛人以徳兮獨不堅其懇辭辭而弗獲兮胡不節而省之心之匪石兮人將亮之藉弗能亮兮豈人之情兮亮而弗悛兮子將復奚為願凡今而後兮毋絶人之好兮去訑訑之色兮黽勉而從之從容中道兮不越乎三巵兢兢惟念兮勿弛乎操持申孫武之令兮斷斷乎無違子其違之兮是誠小人之歸瘞鶴銘并序甲子嵗自都梁携二鶴歸戊辰冬斃其一所獨存者悲唳不食引吭長鳴若失侣者每竊悲之乙亥嵗予逰安康於故人任叔厚寧復得一隻間闗水陸由漢渚下大江轉番陽凡六千里而後至家涉歴山川與予相從不為不久翔舞清唳霜清月曉助予雅致不為不多在彼有得朋之懽於吾遂閒居之適可謂得其所矣丙子七月十八日為僕陳七戕其亢而殞其一丁丑正月十九日又為練十㳺蕩致饑餓而并絶其二予悲念惡劇情所不勝雖撻之逐之不足以償僊禽之非命而釋予之憤懣也既作詩以悼念復作銘以瘞之嗚呼鶴之夀不知其紀兮千六百年鸞鳯同止兮引茲員吭抗纎趾兮感彼簫聲舞清徴兮囘翔金穴鍾秀美兮蕙帳蘭巗怨何以兮胡不一舉飛千里兮乃隨穆王化君子兮厄於僮奴命枉死兮氣填胸臆彈厥指兮豈非尸解離塵澤兮假託世緣歸弱水兮縞衣𤣥裳棄敝屣兮九皋從茲掩雙耳兮終不劈琴薦羞匕兮幣裹纁黄塟山屺兮世無還丹不復起兮作銘見情於以誄兮為方外陳敬叟題墨序楮郡平章徳懋九封之錫黒松使者精騰萬嵗之呼未多祖氏之䧺誇豈俾張金之獨歩惟方外士實人中英粤收異方於此酷好既絳人託宗盟之舊與石侯堅雲水之交鹿角螺丸精見隃麋犀紋玉質妙超易水惟是久淪二頃不樂音見毛詩一貧藏廬阜之十年膠乎安在製天峰之一劑法亦徒然欲効葛僊翁賣薪之為恐有王方翼致富之譙是皆俗子小見烏識逹人大觀必有指廪捐金助之掃煤㸃漆固難俟磨休王斮髓以書佛語豈弗遇金溪子針魚以寫離騷石室觀書載美文嵩之有傳東齋注易更求曹植之吟篇聊慿序文覬遇知者謹序送畵士張道人序侔揣萬類揮翰染素雖畫家一藝然眸子無鑒裁之精心胸有塵俗之氣縱極工妙而鄙野村陋不逃明眼是徒窮思盡心適足以資世之話靶不若不畫之為愈今觀昔之人以一藝彰彰自表於世皆文人才士非以人物山川佛象鬼神著則以樓觀花竹翎毛走獸顯葢未有獨任一見而得萬物之情兼備諸體而擅衆作之美雖張僧繇吳道子閻立本諸公不能之况萬萬不及比者自謂能之可乎古之所謂畫士皆一時名勝涵泳經史見識髙明襟度灑落望之飄然知其有蓬萊道山之丰俊故其發為毫墨意象蕭爽使人寶玩不寘今之畫士祗人役耳視古之人又萬萬不啻也亦有廹於口體之不充俛就世俗之所強問之能彼乎曰能之能此乎曰能之及其吮筆運思茫昧失措鮮不刻烏成鵠畫虎類狗其視古人神竒精妙每不逮之所以若然者未可悉尤之畫工畫工雖志在阿堵而亦有不専在夫阿堵也道人張生畫虎探三昧摹寫形狀蹲踞出伏横行妥尾不下色貴父子世以張畫虎目之逺來訪予留半嵗為予作虎圖花木毛翎數十軸綽有竒趣予嘗為攷之自唐迄今名流固多而張其姓者獨不少如僧繇詢南本騰賛景思質圖玫元昉翼戡經璪素卿道陵者得十有七人出於神僊出於大夫士俱非庸俗輩工佛像者有之翎毛者有之風林水石者又有之皆曲盡奥妙表表傳於今今張生豈其逺裔歟不然何其多能仍兼其伎也一日辭去求詩於予予病酒不暇作特序畫之所以然而送之繼為之説曰夫畫之多品均是藝也鮮有精其能焉葢有精於此而粗於彼得其偏而遺其全今子遂并有之殆造化者私於子矣然未審子之致精措慮果有合於前古無粗彼遺全之譏而一唱三歎果得意外不傳神彩飛動之㫖不乎今予所得者畫爾神聖工妙則有世之鑒别者在予不得而知也子姑行挾是以養身助道不患人之不我知若猶未能皆偶也子其遲之毋怨皇宋嘉定丁丑重陽後十日序耕隠上梁文屈信進退人生孰不求其安榮寤寐歗歌賢者乃欲退而窮處繄先廬南山之下得隙地西麓之隅姑從隠淪以事耕鑿方是閒居士家傳儒業身服聖言語彼世紛全茲天性功名浪語嗟壯志之未酹軒紱儻來念此日之足惜雖䄂山林之手不忘畎畝之忠春雨鳴蓑負耒耜錢鎛之噐寒烟濕履滋稲粱黍稷之苖植杖或耘或耔荷蕢且疆且理矧在昔之君子猶下同於埜夫卧南陽廬耕有莘野以樂堯舜之道以誦周孔之書不以獨善而肆厥身終期兼濟以行其志識其大遯世無悶非斯人將誰與歸久慕前修今希遺躅况有青山遶屋更疏緑水循除樹牆下以桑已辦一區之宅種渭川之竹未饒千戸之侯修棟初扶㣲情是􅄒東襏襫牛衣曬曉紅伊呂不逢湯武聖等閒閒却兩翁翁西春水秧鍼緑葉齊不見昌黎垂訓戒起身公相自鋤犁南稼穡秋成已作甘㪷酒東􅆏相勞苦盈疇吹動碧䰐鬖北伊欲服田須力穡惰農自安不作勞囷㕓胡取禾三百上山疊雲屏開畫障梁鴻逸去人不知兾缺耨時妻為饟下櫛比黄雲嵗多稼小臣憂國願年豐勿闖饑凶待髙價伏願上梁之後人安盤谷詩詠􅜁川鬼神呵禁不祥龜筮恊從廸吉雞豚蕃息虎豹遁潛倉積坻京繭肥甕盎式謹三時之務請言四體之勤落日長鑱草軟牛羊之夕西風短笠波平鴻鴈之秋多釀榨頭春以延方外士五峰新居上梁文竊以還山弄明月厭城市之囂塵㑹圃臨清風擅林塘之雅趣昔聞妙語今得賞音方是閒居士志本歸田心非傲世惟迺祖廼父嘗求志以隠居豈為子為孫敢謀身於利逹念自幼㷀苦每操孤孽之心而稍壯益艱恥徇鍥澆之俗半生浪走三徑殆荒一壑獨專五峯擢秀左列清湖之嶂右峩白石之津後遶方池前縈長坂平林逺岫氣象何啻千里煗翠浮嵐曉夕為之萬態望人村之晻靄占田野之寛閒卜築告成抛梁是頌東衣冠與世同在家常蚤起憂國願年豐杜西時訪武陵溪畏人㝷卜築􅄶性合幽棲杜南局束我何堪自昔愛幽賞今茲得縱貪蘓北石壁横翠色漾楫怕驚鷗來竿待魚食李上此樂清且放入峽喜巉巗出峽愛平曠李下千篇陵鮑謝尊酒樂餘春棋局消長夏蘇伏願上梁之後金穰富溢玉燭陽明時和嵗豐家給人足詩禮與盟之士詭譎潛銷里閭同社之人春秋逸豫樂朝廷之有道幸門館之無私租税蚤輸任縣官之督廹役徭不到承先澤之庇庥得為天民生此王國謹因考室備述斯文功德疏代外舅作天佑昌時朝生賢將桂花方盛得秋氣之正中菊蘂初開覺涼颸之俶至皆以致椿松之祝敢輙修科籙之緣伏願某官茂對休成永同宴喜九五福曰夀膺俾昌俾熾之祥八千嵗為春伸善頌善禱之祝宴吳侯致語代外舅作天朗氣清過重陽之五日地靈人傑生昭代之元戎式啓華筵用伸善頌某官賦姿剛毅藴識䟽通六韜三略之討論源流深逺三令五申之詳審號召嚴明粤從仗鉞以來備見折衝之效山西勁氣天孕精神塞北飛塵夜沉熢燧過中秋而甫經月瑞當世而届佳辰三夀作朋百禄是荷不俟酒罌之恥亟膺樞筦之登某猥以賤工逢茲勝事敢陳口號上奉清歡一昨初登大將壇弓刀旗幟簇雕鞍連營壯士心先服並塞邊人膽已寒天上麒麟祥可卜人間日月老應難明年樞府為公夀慷慨還知酒量寛李福佺化度牒疏剪巫山兩叚之雲休勞夣想從天空三乘之教悉意皈依比丘尼乆矣灰心䕶身符尚難入手若成剗草公案必有捐金檀那庶幾念慮持戒於朝斯夕斯或使愚䝉結緣於聞者見者既脱舞裙歌扇俾親經巻藥爐恩則有歸福豈無報三果説前年經紀故園臺榭亭池一無存者先君子手植惟梅棃櫻三木而已剥蝕於風露斧斤於樵牧肌理朽蠧憔悴横道人多勸伐之余持三不可之説曰三果少而花花而實人咸美之今其老瘠不充人之口不悦人之目子欲伐之乎是不可者一也且物之生也由少而壯由壯而老由老而衰理之常也子不記其少壯乃幸其衰朽而伐之乎是不可者二也以嵗月考之種在予之未生今先君下世三十三年予亦年四十矣視之諸兄行輩今父兄不可見見此果歎手澤之存焉憫孤形之㷀然遐想典型宛其在是子欲伐之是不可者三也客不能對相與抆淚芟剪枯槁剔除逺揚培養愛䕶便覺生意發越是冬依然著花春子滿枝予與向之言者摘其實飲其下而俱有感焉自爾勿剪勿拜尚可期保晚嵗又奚止於斯也哉因為之説金鯉説凡人居第有水有竹而後為勝故予築室地方三十畝流泉五脉室旁鑿池水居其半竹木半之二屋宇亭館又二之一池種魚鰱􅀈􅀈鯉鯽鱮隨地之宜者放之客有以金鯉二十尾為饟者予目之竒甚曰此何自而來哉曩客中都十年見貴戚豪右捜網此魚為佳玩每尾不下數千錢何不往獻以求其贏今暗投於荒山之濵拙亦甚矣客不顧縱之池而去明年春明波暖風酣日霽浮湛下上若黄鸝之穿楊金梭之織組其美無與方者久之不見㳺泳䇿杖㝷究園丁笑為言曰疇昔飛鷺雪立驅逐不驚是必為之捕食矣予曰嘻是固以竒以色而自受其斃者也鱸鯽貴白鮎􅀈貴青魚之正色也故其沉潛容與去來莫測禽鳥亦未易肆其觜喙金鯉尚黄色燦金物生反常暴眩太甚人猶愛之况鷺禽乎然而人知愛而不忍食鷺忍食而不知愛愛之與食情同而好異也亦物之反常有以招其尤而誨其食也豈特魚爾惟花木之反常者亦然惟人之反常眩世者亦然為金鯉説雉説養一雉馴甚次年又買一雉意其共類同籠貯之後雉俱棲若有恐懼色若知先後次序略不敢鬬敵頫首下氣聽命而已先雉昻藏自若頡頑恣傲有驕矜色有凌忽狀予竊怪之不旬日先雉碎面折趐去死無幾後雉洋洋有德色疑莫已敵者余然後知其懼也乃所以藏怒蓄怨也其退也乃所以求勝也雉耿介禽也不能柔㢲者也今若此若奴僕之私為計者也若賔客之相驅逐者也若同列之生傾忌者也不然則兵法所謂必姑與之之術也其蔡澤之攘穰侯者也其蘇秦之取相六國者也其張儀破蘇秦之縱者也吾於是乎有感作雉説梅説梅貴清瘦不貴敷腴雪後園林水邉籬落似全其真若處之名園上苑對之急管繁絃是四皓之去商山夷齊之入瑶室矣古今賦之者何啻數千篇起於宋之鮑参軍備於我朝之林處士近世洮湖陳希顔盡和古今梅詩計三十六巻亦情鍾之甚者然世之詩愈多而和亦多情益多而梅亦益多也曰紅曰白曰蠟曰香曰桃曰杏曰緑蕚曰鵞黄曰紛紅曰雪頰曰千葉曰照水曰鴛鴦者凡數十品不知参軍處士之所詠果何品耶荔枝有譜牡丹亦有譜梅獨無譜乎予欲集之而梅與菊近世亦有譜矣尚何譜之云乎哉姑為之説水僊説予酷愛水僊花以金華僊伯所賦八句櫽括作浣沙溪詞云水上輕盈步月明凌波僊子韈生塵是誰招此斷腸魂種作寒花愁絶意含香艶素欲傾城並芳難弟與難兄對花把酒歌之無斁此花最難種多不著花惟建陽園户植之得宜若葱若薤綿亘疇陌含香艶素想其風味恨不醉卧花邉昨令健步買百十叢而來空手以返再三詰責但云有金琖銀臺而無水僊花其欺侮固不在言然政憚於賫擎姑藉為辭耳殊不知水僊花即世人所謂金琖銀臺者是也俗子敗思每每如斯世事欺凌比比皆是豈獨水僊花筆之説似佳客鄭花説鄭花染家取其木葉燒灰壓色若礬之能收色也山谷名之山礬能言其用矣荆公以其花白比玉謂之瑒花能言其體矣至其香韻後當有合體用而言其合者故唐人詩云一樹瓏􅋛玉刻成飄廊㸃地色輕輕女冠夜覔香來處唯見堦前碎月明若謂此花為玉蘂則此花不與此詩稱予逰京口招隠山時見一大藤盤互髙架僧言是玉蘂花亭上題詠富夥惜乎逰之日乃重九節不及見其花若以文饒詩攷之則又不同所謂玉蘂天中樹金鑾昔共窺決非藤矣而禁林嘉花珍木尚不暇顧問何為植此野樹山礬於彼時豈得别無佳名也哉山間冬來野卉萌突香其花玉其色者數種豈獨山礬是則皆可謂之玉蘂矣一經品題便作佳士誠有幸不幸者瓊花説瓊花在蕃釐觀中庭舊經行維揚值花方盛為止宿焉人謂若聚八僊者是耳有聞而目未之見也此花大如盤旁遶雙白圓片或八或十多至十二中擁碎花圓潔蔟萃香婉色瑩非聚八僊玉蝴蝶可伯仲但記花者云渡江初敵騎徙移去矣今茲再盛不知自何得本花記又言當日尚留小根踰年重發若有神䕶此又妄也不然何不䕶之於未徙之前乎時人好竒揚此抑彼立為無雙之説每每誇世今閩中士大夫家此種亦多予嘗用脱果法自后土祠移本來歸與諸公所植無闕非一本也但瓊字若如元獻晏公引文選注以瓊為赤玉謂殊不相類而蔡寛夫詩話載王元之始易玉蘂為瓊花若然則詳一樹瓏􅋛玉刻成之詩非為山礬設也言亦有理尚俟博物者詳之愛説建亭兩載而未名嘉定十年七月二十有四日獨坐其上思索無與是亭稱者將歸焉歸而復止焉坐踰時風鳴松竹蕭騷有韻聽之不足睨而視之又踰時若有得焉曰我得其説矣將掲以雲濤雲濤謂松也詩云雲影亂鋪地濤聲寒在空曰於松得矣如竹何不若掲之以浄香浄香謂竹也詩云雨洗娟娟浄風吹細細香曰於竹得矣松其謂我何然則棄竹取松竹將怨我退松進竹松無怨耶於是兩全之曰讀書取讀書松竹林之句也繼自念言予築居此山有書室又有書樓養浩有堂頥真有館胡不紬繹經史必㳺玩一亭然後可以讀古人之書耶不覺抵掌大笑拂衣竟起俯顧山石數拳發竒獻技予不忍去曰石其不可愛歟竒章公之所嗜者予亦嗜之當以愛石名自謂得其似矣於石宜矣於亭稱矣進撫是石見植者蒼者叢者秀者挺而立者直而勁者無不可愛立而思之趨而就之走而摩拊之遶而盤桓之是誠足以為愛者子猷愛竹檻有竹焉元亮愛菊籬有菊焉隠居愛松山有松焉君復愛梅亭有梅焉茂實愛蓮池有蓮焉屈原愛蘭砌有蘭焉僧儒愛石山有石焉禦冦愛泉川有泉焉夫以數弓之地而古之人愛者萃聚無遺古人得其一亦足以樂其生我今兼之是天與也地與也造物與也縂其與而受之合其愛而名之使來者知我之愛者愛其所愛而不愛其所不愛也勢要也爵禄也卿相也富貴利逹也其可愛乎作愛説哨遍長橋天下絶景也松江太湖舉目千里風濤不作水面砥平歸颿征棹相望於黄蘆煙草之際去來乎橋之左右者若非人世極畫工之巧所莫能形容每來維舟未嘗即去徜徉延佇意盡然後行至欲作數語以狀風景勝槩辭不意逮筆随句閣良可慨嘆己未冬自雲陽歸閩臘月望後一日漏下一鼓檥舟橋西披衣登垂虹時夜將半雪月交輝水天一色顧影長嘯不知此身之寄於旅返而登舟謂偕行者周生曰佳哉斯景也詎可無樂乎於是相與破霜蟹斫細鱗持兩螯舉大白歌赤壁之賦酒酣樂甚周生請曰今日之事安可無一言以識之予曰然遂櫽括坡僊之語為哨遍一闋詞成而歌之生笑曰以公之才豈不能自寓意數語而乃綴緝古人之辭章得不為名文疵乎余曰不然昔坡僊葢嘗以靖節之詞寄聲乎此曲矣人莫有非之者予雖不敏不敢自亞於昔人然捧心効顰不自知醜葢有之矣而寓意於言之所樂則雖賢不肖抑何異哉今取其言之足以寄吾意者而為之歌知所以自樂耳子何哂焉木葉盡凋湖色接天雪月明江水凌萬頃一葦縱所之若慿虛馭風僊子聽洞簫綿延不絶如縷餘音嫋嫋逰絲曵廼舉酒賦詩玉鱗霜蟹是中風味偏美任滿頭堆絮雪花飛更月澹蓬窻凍雲垂山鬱蒼蒼槁卧沉沉夜鵲驚起凍噫倚蘭槳兮我今恍惚遺身世漁樵甘放浪蜉蝣然寄天地嘆富貴何時功名浪語人生寓樂雖情爾知逝者如斯盈虛如彼則知變者如是且物生宇宙各有司非已有纎毫莫得之委吾心耳目所寄用之而不竭取則不吾禁自色自聲本非有意望東來孤鶴縞其衣袂乘之從此僊矣蝶戀花北津夜雪燈火已收正月半一夜東風吹得寒威轉怪得美人貪睡暖飛瑛積玉千林變睡道是桞綿春尚淺比着梅花花已都零亂漠漠一天迷望眼多情更把征衣㸃賀新郎代黄端夫白牡丹京師妓李師師也畫者曲盡其妙輸棋者賦之午睡鶯驚起鬢雲偏􅀢鬆未整鳯釵斜墜宿酒殘粧無意緒春恨春愁似水誰共説厭厭情味手展流蘓腰肢痩嘆黄金兩鈿香消臂心事逺仗誰寄簾櫳漸是槐風細對梧桐清陰滿院夏初天氣囘首春空梨花夢屈指從頭暗記嘆薄倖抛人容易目斷孤鴻沉雙鯉恨蕭郎不寄相思字幽恨積黛眉翠憶王孫清明病酒淑景韶光晴晝簾外雨欲無還有流鶯枝上轉新聲夢初醒厭厭病酒天連碧草凝情久思舊事不堪搔首懐人有恨水雲深又緑暗橋西桞戀繡衾閨怨桞絮風翻髙下飛雨籠晴香徑尚泥女伴笑踏青好鳯釵偏花壓鬢垂亂鶯雙燕春情緒攪愁心欲訴向誰人問道因誰痩撚青梅閒斂黛眉惜分飛桞絮池上樓臺堤上路盡日悠揚飛舞欲下還重舉又隨蝴蝶墻東去糁逕飄空無定處來往緑窻朱戸却被春風妬送將蛛網留連住浣溪沙木犀天上僊人蕚緑華何年分種小山家九秋風露溢牕紗宻宻翠羅攅玉葉團團黄粟刻金花一枝歸挿鬢雲斜賀新郎近聞敵國式微諸公未有勸上修飭内治以待攘者書生感憤不能已用辛稼軒金縷詞韻􅄒懐此詞葢鷺鷥林寄陳同父者韻險甚稼軒自和凡三篇語意俱到捧心效顰輙不自揆同志毋以其迂而廢其言往事何堪説念人生消磨寒暑謾營裘葛少日功名頻看鏡緑鬢鬅鬙未雪漸老矣愁生華髪國恥家讎何年報痛傷神遥望闗河月悲憤積付湘瑟人心未可隨時别守忠誠不替天意自能符合誤國諸人今何在囘首怨深次骨歎南北久成離絶中夜聞雞狂起舞䄂青萍戞擊光磨鐡三太息眥空裂同前再韻賦梅東閣慿詩説對丰姿飄然杖屨澹然巾葛竹外一枝斜更好玉質冰肌粲雪誰折向滿頭宣髪水驛雲忩烟庭院更宜晴宜雨還宜月霜夜永景蕭瑟孤芳夐與羣芳别隴程遙攀條難寄碧雲驚合桃李漫山空春艶不比仙風道骨有瀟灑清新竒絶我被幽香相懊惱宋廣平豈但心如鐡飛暗度石吹裂東坡梅詩昨夜東風吹石裂暗隨飛雪度闗山同前再韻賦雪曉聽兒曹説道前村疎梅莫與蔽蕭纒葛急與呼童誅剪盡趂此江天暮雪唤小艇漁翁鶴髪凜冽寒風吹酒面與何人共泛山陰月歸浩歎御琴瑟世寰恍惚山川别望瓊樓玉宇相映爛銀環合冰柱雪車新句就不療饑腸病骨奈野鳥千山飛絶我笑書生貧亦甚誦布衾嵗久寒如鐡兒惡卧踏裏裂滿江紅避暑午轉槐陰正炎暑侵肌似醉問何處披襟散髪解衣揚袂傍沼茅亭楊桞綠倚崖草閣梧桐翠喚玉人纎手掬清泉生涼意開枕簟浮𤓰芰瓊液淺歌喉細對文禽雪鷺助成幽致十頃碧蓮瀟灑國萬竿修竹清涼世筭此時情緒有誰同吾儂自同前雙頭蓮一柄雙花低翠葢呈祥現美人正在薫風亭上滿襟如水二陸比方誇俊少兩喬相並修容止雨初晴午永鬬紅酣真竒耳雙白鷺雙頳鯉飛與泳俱來此綰雙鬟天上侍香童子雙劒豐城雙孕秀雙鳬鄴縣雙趨起謾空談國士本無雙今雙矣沁園春嘆世浮利虛名筭來何用蝸角蠅頭笑勞生一夢兩輪催逼脆如朝露輕若春漚有限精神無窮世路刼刼忙忙誰肯休堪驚嘆嘆癡人未悟終日營求百年光景雲浮把氣馬心猿須早收有真僊秘訣飱霞導引丹砂鈆汞早與身謀閒是閒非他強我弱一任從教風馬牛還知道上蓬萊穏路八表神逰念奴嬌次韻范正之柳絮水軒沙岸午風輕飄動一天晴雪日色晶熒光眩眼細逐逰絲明滅簾幕中間樓臺側畔渾是瑶瑛積綴松黏竹恍然如對三絶遥認髣髴飛花花非還似惱亂多情客㸃染春衫無定處又轉沉香亭北宻宻疎疎斜斜整整似雪難分别坡僊不見後人有口何説同前次韻斷虹開霽浄秋容㸃㸃初收㣲雨夕下生陰山影澹縹緲烟雲吞吐烏㡌風偏青鞵沙軟誤入桃谿塢多情鷗鷺偶來忽又飛去日暮修竹佳人霧綃瓊佩綽約疑僊侣愧我禪心春盡絮不逐東風飛舞紅葉題詩紫雲傳恨宻意渠能訴此情疎隔不闗樓外烟樹菩薩蠻暮濤掀浪溪流急單衣未試春寒力是處緑陰穠春深楊桞風人依溪岸住酒美忘歸去巢燕墮芹泥幽禽花外啼同前鴉兒學盡猶嫌醜佯羞步歩隨孃後春淺痩花枝凝愁為阿誰那囘筵畔見有意相留戀只恐後期愆章臺飛桞綿鷓鴣天賦雪樓外銀屏入望賖樓前鷗鷺舞交加穿林淅瀝飛瓊屑度嶂繽紛過桞花歌白雪醉流霞晚寒寒似夜來些明朝酒醒掀簾幕簾幕依然賣酒家西江月世事從來無據人生自古難慿茫如天水有雲萍聚散任他形影每恠東陽痩損常􅅓騎省多情如今我也痩稜稜却喜青青兩鬢水調歌頭飲垂虹三載役京口十度過松江垂虹亭下烟水長是暎篷忩釣得錦鱗成鱠快把霜螯浩飲豪氣未能降醉舞影零亂心逐浪㫪撞景蒼茫歌欸乃石空硿蒹葭深處適意魚鳥自雙雙便擬輕舟短棹明月清風長共與世絶紛哤嘉遯有真隠不羡鹿門龎醉落魄用范石湖韻江頭離席晚潮雙櫓催行色往來属玉雙飛白笑我多情猶作未歸客紅塵奔走何時息歸心還似投林翼角巾醉裏從欹側獨立東風天際露岑碧長相思西湖夜醉湖山横湖水平買箇湖船一葉輕傍湖隨桞行秋風清秋月明誰搗秋砧烟外聲悲秋無盡情鷓鴣天發舟安康朋逰見留往復三用韻芳草萋萋入眼濃一年花事又怱怱吐舒桃臉今朝雨零落梅粧昨夜風雲接野水連空畫欄十二倚誰同兩眉新恨無分付獨立蒼苔數落紅同前夢遶天涯去意濃客愁春恨兩怱怱緑波初漲桃花浪畫鷁輕隨桞絮風無筆力判虛空闗山千里兩心同魚書鴈字都休問只有啼痕翠袖紅同前山色都如歸興濃春融融處客怱怱岸花影裏鶯吟霧江閣陰中燕受風凭畫檻睇層空情衷待説幾時同不如且盡尊中緑圖得醄醄醉臉紅菩薩蠻杏花昨日杏花春滿樹今晨雨過香填路零落軟臙脂濕紅無力飛轉頭春易去春色歸何處待宻與春期春歸人也歸浣溪沙送連景昭歸三山來日江頭桞帶香去時籬下菊花黄人生離别幾凄涼拂面紅塵飛冉冉背人白日去堂堂尺書休負鴈南翔眼兒媚十年不見桞腰肢契濶幾何時天遥地逺秋悲春恨只在雙眉鴈聲今夜樓西畔情愫眇難期杏花風景梧桐夜月都是相思桃源憶故人暮霞散綺西溪浦天上晴雲開絮清絶梅花幾樹惱亂春愁處小橋流水人來處沙岸浴鷗飛鷺誰畫江南好處著我閒中屨糖多令登多景樓何處浣離憂消除許大愁望長江滚滚東流一去鄉闗能幾日纔屈指又中秋蘆葉滿汀洲沙磯小艇收醉歸來明月江樓欲把情懐輸冩盡終不似少年逰小重山春水東流一葦杭春情剪不斷漢江長江花江草為誰芳渾不似沙暖睡鴛鴦且道不思量怕他知得後痛肝腸路遥天濶水茫茫成病也教我怎禁當行香子鄱陽食魚雪白肥鰜墨黒修鮎桞穿腮小大相兼金刀批臠鮮活甘甜或時􅠉或時煮或時醃揎腕佳人玉手纎纎縷銀絲取意無厭羮須澹煮滋味重添滴兒醯呷兒酒撮兒鹽臨江僊富池岸下人在空江烟浪裏葉舟輕似浮漚此心無怨也無憂漢江迷望眼衮衮直東流兩岸荻蘆青不斷四山岡嶺綢繆晚風吹袂冷颼颼誰知三伏暑全似菊花秋漁家傲白湖觀捕魚漢水悠悠還蕩漾漁翁出没穿風浪千尺絲綸垂兩槳收又放月明長在烟波上釣得活鱗鯿縮項篘成玉液香浮盎醉倒自歌歌自唱輕艤舫碧蘆紅蓼清灘傍菩薩蠻鄂渚岸下烟汀一抹蒹葭渚風亭雨下荷花浦月色漾波浮波流月自留若耶溪上女兩兩三三去眉黛斂羞娥採菱隨櫂歌烏夜啼夜泊揚子江長亭急管生愁楚天秋落日寒鴉飛盡水悠悠紅蓼岸白蘋洲浴輕鷗人在碧雲深處倚髙樓虞美人寒來暑往何時了世故催人老一人口挿幾張匙何用波波刼刼没休時饑來喫飯困來睡莫把身為累誰能較短與量長落葉西風一夢熟黄粱賀新郎送鄭材卿莫向愁人説嘆人生不如意事十常七八是則中年傷懐抱客裏何堪送客又添取一襟悽咽岸桞凋零秋容澹黯銷凝怎忍輕攀折重㑹面甚時節杏花麗日梅花雪記當時一觴一詠楚雲湘月别後君休勞逺夢轉眼江南塞北莫謾被閒愁縈結且判離筵今夕醉霎時間便見蘭舟發空悵望水雲濶方是閒居士小稿巻下
