body:
  text: 方是閒居士小稿自記遊季仙來山中相訪索豫詩文不置口辭拒不能為檢尋舊唱和獨出一百首新作七十一首雜著二十七首詞四十一首集成兩編以酬其雅志豫語塵俗不足道季仙先世文學彰彰在人口而季仙伯仲詞翰又皆稱於朋儕今棄彼取此豈厭膏粱而思藜糗忘黃鐘而取瓦缶者乎因書其後而歸之嘉定丁丑重陽後十日種春子劉學箕習之父書於方是閒堂
